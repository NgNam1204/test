<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thư viện ảnh lớp</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f5f5f5;
}

h1 {
  text-align:center;
  padding:20px;
}

.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:10px;
  padding:20px;
}

.gallery img {
  width:100%;
  border-radius:10px;
  cursor:pointer;
  object-fit:cover;
}

/* LIGHTBOX */
#lightbox {
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  z-index:999;
}

#view {
  max-width:90%;
  max-height:90%;
  object-fit:contain;
  transition: transform 0.1s;
  cursor: grab;
}

/* controls */
.controls span {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:3.5rem;
  color:white;
  background:rgba(0,0,0,0.4);
  padding:15px 25px;
  border-radius:10px;
  cursor:pointer;
  user-select:none;
}

#prev { left:20px; }
#next { right:20px; }

.controls span:hover {
  background:rgba(255,255,255,0.3);
}

.close {
  position:absolute;
  top:20px;
  right:30px;
  font-size:2rem;
  color:white;
  cursor:pointer;
}

.download {
  position:absolute;
  bottom:30px;
  background:white;
  padding:10px 20px;
  border-radius:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>📸 Thư viện ảnh lớp</h1>
<div class="gallery" id="gallery"></div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <div class="close" onclick="closeBox()">✕</div>

  <div class="controls">
    <span id="prev" onclick="prev()">⟨</span>
    <span id="next" onclick="next()">⟩</span>
  </div>

  <img id="view">

  <div class="download" onclick="download()">⬇ Tải ảnh</div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwg5SQ5R6E9chRaTGVGMbTUleup33u4F9usvltpLDlMhHWxw2QEKk9VVBxuGEL8hpHq/exec";

let imgs = [];
let current = 0;
let scale = 1;
let posX = 0, posY = 0;
let isDragging = false;
let startX, startY;

async function load() {
  try {
    const res = await fetch(API);
    const data = await res.json();

    const gallery = document.getElementById("gallery");

    data.forEach(section => {
      section.images.forEach(item => {
        imgs.push(item.url); // ✅ KHÔNG thêm =s3000 nữa
      });
    });

    imgs.forEach((url, i) => {
      const img = document.createElement("img");
      img.src = url;
      img.onclick = () => open(i);
      gallery.appendChild(img);
    });

  } catch (err) {
    document.body.innerHTML = "<h2 style='text-align:center'>❌ Lỗi load API</h2>";
    console.error(err);
  }
}

function open(i) {
  current = i;
  show();
  document.getElementById("lightbox").style.display = "flex";
}

function show() {
  const img = document.getElementById("view");
  img.src = imgs[current];

  scale = 1;
  posX = 0;
  posY = 0;

  updateTransform();
}

function updateTransform() {
  const img = document.getElementById("view");
  img.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
}

function next() {
  current = (current + 1) % imgs.length;
  show();
}

function prev() {
  current = (current - 1 + imgs.length) % imgs.length;
  show();
}

function closeBox() {
  document.getElementById("lightbox").style.display = "none";
}

function download() {
  const a = document.createElement("a");
  a.href = imgs[current];
  a.download = "image.jpg";
  a.click();
}

/* ZOOM bằng con lăn */
const imgView = document.getElementById("view");

imgView.addEventListener("wheel", function(e) {
  e.preventDefault();

  const zoomSpeed = 0.1;

  if (e.deltaY < 0) scale += zoomSpeed;
  else scale -= zoomSpeed;

  if (scale < 1) scale = 1;
  if (scale > 5) scale = 5;

  updateTransform();
}, { passive: false });

/* CHẶN SCROLL */
document.getElementById("lightbox").addEventListener("wheel", function(e) {
  e.preventDefault();
}, { passive: false });

/* DRAG */
imgView.addEventListener("mousedown", e => {
  isDragging = true;
  startX = e.clientX - posX;
  startY = e.clientY - posY;
  imgView.style.cursor = "grabbing";
});

window.addEventListener("mousemove", e => {
  if (!isDragging) return;
  posX = e.clientX - startX;
  posY = e.clientY - startY;
  updateTransform();
});

window.addEventListener("mouseup", () => {
  isDragging = false;
  imgView.style.cursor = "grab";
});

/* DOUBLE CLICK RESET */
imgView.addEventListener("dblclick", () => {
  scale = 1;
  posX = 0;
  posY = 0;
  updateTransform();
});

load();
</script>

</body>
</html>
