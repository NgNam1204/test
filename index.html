<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Thư viện ảnh lớp</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    h2 {
      margin-top: 40px;
      border-left: 5px solid #333;
      padding-left: 10px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    img, video {
      width: 100%;
      border-radius: 10px;
      cursor: pointer;
      object-fit: cover;
      transition: transform 0.2s;
    }

    img:hover, video:hover {
      transform: scale(1.03);
    }

    #lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    #lightbox img,
    #lightbox video {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
    }

    #loading {
      text-align: center;
      margin-top: 50px;
      font-size: 18px;
      color: #666;
    }
  </style>
</head>

<body>

<h1>📸 Thư viện ảnh lớp</h1>
<div id="loading">Đang tải dữ liệu...</div>
<div id="app"></div>

<div id="lightbox" onclick="this.style.display='none'"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby81rHFNzzCmWAXTuceQ8atmPrLZ_eTs9ivgE4fKFVgXFJu6v9Pq9NjVE2dAU_yIk0/exec";

async function loadData() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    document.getElementById("loading").style.display = "none";

    const app = document.getElementById("app");

    data.forEach(section => {
      const title = document.createElement("h2");
      title.textContent = section.folder;

      const gallery = document.createElement("div");
      gallery.className = "gallery";

      section.images.forEach(item => {
        const name = item.name.toLowerCase();
        let el;

        if (name.match(/\.(mp4|mov|webm)$/)) {
          el = document.createElement("video");
          el.src = item.url;
          el.controls = true;
        } else if (name.match(/\.(jpg|jpeg|png|gif|webp)$/)) {
          el = document.createElement("img");
          el.src = item.url;
          el.loading = "lazy";
        } else {
          return;
        }

        el.onclick = () => openLightbox(item);
        gallery.appendChild(el);
      });

      app.appendChild(title);
      app.appendChild(gallery);
    });

  } catch (err) {
    document.getElementById("loading").innerText = "Lỗi tải dữ liệu!";
    console.error(err);
  }
}

function openLightbox(item) {
  const box = document.getElementById("lightbox");
  box.innerHTML = "";

  const name = item.name.toLowerCase();
  let el;

  if (name.match(/\.(mp4|mov|webm)$/)) {
    el = document.createElement("video");
    el.src = item.url;
    el.controls = true;
    el.autoplay = true;
  } else {
    el = document.createElement("img");
    el.src = item.url;
  }

  box.appendChild(el);
  box.style.display = "flex";
}

loadData();
</script>

</body>
</html>
