<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kỷ Yếu 12A4</title>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }

h1 { text-align:center; padding:20px; }

.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:10px;
  padding:20px;
}

img {
  width:100%;
  border-radius:10px;
  cursor:pointer;
  object-fit:cover;
}

/* LIGHTBOX */
#lightbox {
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

#lightbox img {
  max-width:90%;
  max-height:80%;
  object-fit:contain;
  transition:0.3s;
}

.controls {
  position:absolute;
  top:50%;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 20px;
  color:white;
  font-size:2rem;
  cursor:pointer;
}

.close {
  position:absolute;
  top:20px;
  right:30px;
  color:white;
  font-size:2rem;
  cursor:pointer;
}

.download {
  position:absolute;
  bottom:30px;
  background:white;
  padding:10px 20px;
  border-radius:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>📸 Thư viện ảnh lớp</h1>
<div class="gallery" id="gallery"></div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <div class="close" onclick="closeBox()">✕</div>

  <div class="controls">
    <span onclick="prev()">⟨</span>
    <span onclick="next()">⟩</span>
  </div>

  <img id="view">

  <div class="download" onclick="download()">⬇ Tải ảnh</div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwg5SQ5R6E9chRaTGVGMbTUleup33u4F9usvltpLDlMhHWxw2QEKk9VVBxuGEL8hpHq/exec";

let imgs = [];
let current = 0;

async function load() {
  const res = await fetch(API);
  const data = await res.json();

  const gallery = document.getElementById("gallery");

  data.forEach(section => {
    section.images.forEach(item => {
      imgs.push(item.url);
    });
  });

  imgs.forEach((url, i) => {
    const img = document.createElement("img");
    img.src = url;
    img.onclick = () => open(i);
    gallery.appendChild(img);
  });
}

function open(i) {
  current = i;
  show();
  document.getElementById("lightbox").style.display = "flex";
}

function show() {
  const img = document.getElementById("view");
  img.src = imgs[current];
  img.style.transform = "scale(1)";
}

function next() {
  current = (current + 1) % imgs.length;
  show();
}

function prev() {
  current = (current - 1 + imgs.length) % imgs.length;
  show();
}

function closeBox() {
  document.getElementById("lightbox").style.display = "none";
}

function download() {
  const a = document.createElement("a");
  a.href = imgs[current];
  a.download = "image.jpg";
  a.click();
}

/* zoom bằng click */
document.getElementById("view").onclick = function() {
  this.style.transform =
    this.style.transform === "scale(2)" ? "scale(1)" : "scale(2)";
};

load();
</script>

</body>
</html>
